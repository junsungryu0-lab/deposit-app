<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>예치 현황 관리</title>
<style>
  :root{
    --navy:#10243e;
    --navy-2:#16324f;
    --paper:#f6f4ee;
    --line:#d8d2c4;
    --accent:#b5762e;
    --accent-soft:#f0e3d1;
    --danger:#9c3b3b;
    --text:#2a2a28;
    --muted:#6f6a5e;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--text);
    font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif;
  }
  .wrap{max-width:1100px;margin:0 auto;padding:32px 24px 60px;}

  header{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    border-bottom:2px solid var(--navy);
    padding-bottom:16px;
    margin-bottom:28px;
    flex-wrap:wrap;
    gap:12px;
  }
  header h1{
    font-size:22px;
    letter-spacing:0.5px;
    margin:0 0 4px;
    color:var(--navy);
    font-weight:700;
  }
  header .sub{font-size:13px;color:var(--muted);}
  .summary{display:flex;gap:24px;font-size:13px;color:var(--navy-2);flex-wrap:wrap;justify-content:flex-end;}
  .summary b{display:block;font-size:18px;color:var(--navy);font-weight:700;}

  .panel{
    background:#fff;
    border:1px solid var(--line);
    border-radius:4px;
    padding:20px;
    margin-bottom:24px;
  }
  .panel h2{
    font-size:14px;
    margin:0 0 14px;
    color:var(--navy);
    letter-spacing:0.3px;
  }
  .grid-form{
    display:grid;
    grid-template-columns: repeat(4, 1fr);
    gap:12px;
  }
  .field{display:flex;flex-direction:column;gap:4px;}
  .field label{font-size:11px;color:var(--muted);}
  .field input, .field select{
    border:1px solid var(--line);
    border-radius:3px;
    padding:8px 9px;
    font-size:13px;
    font-family:inherit;
    background:#fdfcfa;
  }
  .field input:focus, .field select:focus{outline:1.5px solid var(--accent);}
  .form-actions{
    grid-column: 1 / -1;
    display:flex;
    gap:8px;
    margin-top:6px;
  }
  button{
    border:none;
    border-radius:3px;
    padding:9px 18px;
    font-size:13px;
    cursor:pointer;
    font-family:inherit;
  }
  .btn-primary{background:var(--navy);color:#fff;}
  .btn-primary:hover{background:var(--navy-2);}
  .btn-ghost{background:#eee9dc;color:var(--navy);}
  .btn-ghost:hover{background:#e2dac8;}

  table{width:100%;border-collapse:collapse;font-size:13px;}
  thead th{
    text-align:left;
    padding:10px 8px;
    background:var(--navy);
    color:#fff;
    font-weight:500;
    font-size:12px;
    letter-spacing:0.3px;
  }
  tbody td{padding:10px 8px;border-bottom:1px solid var(--line);}
  tbody tr:hover{background:#fbf9f4;}
  .amt{text-align:right;font-variant-numeric:tabular-nums;}
  .badge{
    display:inline-block;
    padding:2px 8px;
    border-radius:10px;
    font-size:11px;
  }
  .badge.ok{background:#e4ece1;color:#3c6b3a;}
  .badge.soon{background:var(--accent-soft);color:var(--accent);}
  .badge.over{background:#f3dede;color:var(--danger);}
  .row-actions a{
    font-size:12px;
    color:var(--navy-2);
    cursor:pointer;
    margin-right:10px;
    text-decoration:underline;
  }
  .row-actions a.del{color:var(--danger);}
  .empty{padding:30px;text-align:center;color:var(--muted);font-size:13px;}
  .toast{
    position:fixed;bottom:24px;right:24px;
    background:var(--navy);color:#fff;
    padding:10px 16px;border-radius:4px;font-size:13px;
    opacity:0;transform:translateY(8px);
    transition:all .25s;pointer-events:none;
  }
  .toast.show{opacity:1;transform:translateY(0);}
  .footer-link{font-size:12px;color:var(--muted);}
  .footer-link a{color:var(--navy-2);text-decoration:underline;cursor:pointer;}

  /* 엑셀 업/다운로드 패널 */
  .excel-bar{
    display:flex;
    gap:10px;
    align-items:center;
    flex-wrap:wrap;
  }
  .btn-excel-dl{background:#1d6f42;color:#fff;}
  .btn-excel-dl:hover{background:#155234;}
  .btn-excel-tmpl{background:#e8f4ec;color:#1d6f42;border:1px solid #b2d4bc;}
  .btn-excel-tmpl:hover{background:#d4ecdb;}
  .btn-excel-ul{background:var(--accent);color:#fff;}
  .btn-excel-ul:hover{background:#9a631f;}

  .upload-area{
    border:2px dashed var(--line);
    border-radius:4px;
    padding:20px;
    text-align:center;
    color:var(--muted);
    font-size:13px;
    cursor:pointer;
    transition:border-color .2s;
    margin-top:12px;
    display:none;
  }
  .upload-area.active{border-color:var(--accent);color:var(--accent);}
  .upload-area:hover{border-color:var(--navy-2);}

  .error-box{
    background:#fdf0f0;
    border:1px solid #e8b4b4;
    border-radius:4px;
    padding:14px 16px;
    margin-top:12px;
    font-size:13px;
    color:var(--danger);
    display:none;
  }
  .error-box .err-row{margin-bottom:6px;}
  .error-box .err-row strong{display:block;margin-bottom:2px;}
  .error-box ul{margin:0;padding-left:16px;}

  .success-box{
    background:#f0faf3;
    border:1px solid #a8d5b5;
    border-radius:4px;
    padding:12px 16px;
    margin-top:12px;
    font-size:13px;
    color:#1d6f42;
    display:none;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>예치 현황 관리</h1>
      <div class="sub">고객 예금 상품 등록 · 만기 관리 (로컬 저장)</div>
    </div>
    <div class="summary">
      <div>건수<b id="sumCount">0</b></div>
      <div>총 예치금액<b id="sumAmt">0원</b></div>
      <div>30일 내 만기<b id="sumSoon">0건</b></div>
      <div>만기 예상 이자<b id="sumInterest">0원</b></div>
      <div>만기 예상 수령액<b id="sumMaturity">0원</b></div>
    </div>
  </header>

  <div class="panel">
    <h2 id="formTitle">신규 등록</h2>
    <div class="grid-form">
      <div class="field"><label>고객명</label><input id="f_customer" placeholder="예: 홍길동"></div>
      <div class="field"><label>은행종류</label>
        <select id="f_bank">
          <option value="">선택</option>
          <option>농협은행</option><option>국민은행</option><option>신한은행</option>
          <option>우리은행</option><option>하나은행</option><option>기업은행</option>
          <option>새마을금고</option><option>신협</option><option>저축은행</option><option>기타</option>
        </select>
      </div>
      <div class="field"><label>예금(상품)명</label><input id="f_product" placeholder="예: 정기예금 12개월"></div>
      <div class="field"><label>금액(원)</label><input id="f_amount" type="number" placeholder="예: 10000000"></div>
      <div class="field"><label>예치일</label><input id="f_start" type="date"></div>
      <div class="field"><label>만기일</label><input id="f_end" type="date"></div>
      <div class="field"><label>이율(%)</label><input id="f_rate" type="number" step="0.01" placeholder="예: 3.25"></div>
      <div class="form-actions">
        <button class="btn-primary" id="saveBtn">등록</button>
        <button class="btn-ghost" id="cancelBtn" style="display:none;">취소</button>
      </div>
    </div>
  </div>

  <div class="panel">
    <h2>엑셀 업로드 / 다운로드</h2>
    <div class="excel-bar">
      <button class="btn-excel-dl" id="excelDownBtn">⬇ 엑셀 다운로드</button>
      <button class="btn-excel-tmpl" id="excelTmplBtn">📋 샘플 양식 받기</button>
      <button class="btn-excel-ul" id="excelUpToggle">⬆ 엑셀 업로드</button>
    </div>
    <div class="upload-area" id="uploadArea">
      <input type="file" id="excelFileInput" accept=".xlsx,.xls" style="display:none;">
      <div id="uploadPrompt">📂 엑셀 파일을 여기에 끌어다 놓거나, 클릭해서 선택하세요<br><span style="font-size:11px;margin-top:4px;display:block;">샘플 양식에 맞춰 작성된 .xlsx 파일만 업로드 가능합니다</span></div>
      <div id="uploadFileInfo" style="display:none;"></div>
      <button class="btn-primary" id="uploadSubmitBtn" style="margin-top:12px;display:none;">업로드 실행</button>
    </div>
    <div class="error-box" id="uploadErrorBox"></div>
    <div class="success-box" id="uploadSuccessBox"></div>
  </div>

  <div class="panel">
    <h2>조회 조건</h2>
    <div class="grid-form" id="queryForm">
      <div class="field"><label>고객명</label><input id="q_customer" placeholder="예: 홍길동"></div>
      <div class="field"><label>은행종류</label>
        <select id="q_bank"><option value="">전체</option></select>
      </div>
      <div class="field"><label>예치일 시작</label><input id="q_start_from" type="date"></div>
      <div class="field"><label>예치일 종료</label><input id="q_start_to" type="date"></div>
      <div class="field"><label>만기일 시작</label><input id="q_end_from" type="date"></div>
      <div class="field"><label>만기일 종료</label><input id="q_end_to" type="date"></div>
      <div class="field"><label>금액 이상</label><input id="q_amt_min" type="number" placeholder="원"></div>
      <div class="field"><label>금액 이하</label><input id="q_amt_max" type="number" placeholder="원"></div>
      <div class="field"><label>정렬</label>
        <select id="sortSel">
          <option value="end_asc">만기일 빠른순</option>
          <option value="end_desc">만기일 늦은순</option>
          <option value="amt_desc">금액 큰순</option>
          <option value="amt_asc">금액 작은순</option>
        </select>
      </div>
      <div class="form-actions">
        <button class="btn-primary" id="queryBtn">조회</button>
        <button class="btn-ghost" id="resetQueryBtn">초기화</button>
      </div>
    </div>
  </div>

  <div class="panel">
    <h2>목록 <span id="resultCount" style="color:var(--muted);font-weight:400;font-size:12px;"></span></h2>
    <table>
      <thead>
        <tr>
          <th>고객명</th><th>은행종류</th><th>예금명</th>
          <th style="text-align:right;">금액</th><th>예치일</th><th>만기일</th>
          <th style="text-align:right;">이율</th>
          <th style="text-align:right;">만기 예상이자</th>
          <th style="text-align:right;">만기 수령액</th>
          <th>상태</th><th></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
    <div id="emptyMsg" class="empty" style="display:none;">조회 조건에 맞는 내역이 없습니다.</div>
  </div>

  <div class="footer-link">데이터 파일은 data/deposits.json 에 저장됩니다. &nbsp;|&nbsp; <a id="backupLink">백업 파일 다운로드</a></div>
</div>
<div class="toast" id="toast"></div>

<script>
let records = [];
let editingId = null;

const fmtAmt = n => Number(n).toLocaleString('ko-KR') + '원';
const todayStr = () => new Date().toISOString().slice(0,10);
const daysUntil = d => Math.ceil((new Date(d) - new Date(todayStr())) / 86400000);

function depositDays(start, end){
  return Math.max(0, Math.round((new Date(end) - new Date(start)) / 86400000));
}
function calcInterest(r){
  if(r.rate == null || r.rate === '') return 0;
  const days = depositDays(r.start, r.end);
  return Math.round(r.amount * (r.rate/100) * (days/365));
}
function calcMaturityAmount(r){
  return r.amount + calcInterest(r);
}

function statusBadge(end){
  const d = daysUntil(end);
  if(d < 0) return '<span class="badge over">만기경과</span>';
  if(d <= 30) return `<span class="badge soon">D-${d}</span>`;
  return '<span class="badge ok">정상</span>';
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 1800);
}

async function loadAll(){
  try{
    const res = await fetch('/api/deposits');
    records = await res.json();
  }catch(e){
    showToast('데이터를 불러오지 못했습니다. 서버가 실행 중인지 확인해주세요.');
    records = [];
  }
  render();
}

function resetForm(){
  ['f_customer','f_bank','f_product','f_amount','f_start','f_end','f_rate'].forEach(id=>{
    document.getElementById(id).value = '';
  });
  editingId = null;
  document.getElementById('formTitle').textContent = '신규 등록';
  document.getElementById('saveBtn').textContent = '등록';
  document.getElementById('cancelBtn').style.display = 'none';
}

document.getElementById('saveBtn').addEventListener('click', async ()=>{
  const customer = document.getElementById('f_customer').value.trim();
  const bank = document.getElementById('f_bank').value;
  const product = document.getElementById('f_product').value.trim();
  const amount = document.getElementById('f_amount').value;
  const start = document.getElementById('f_start').value;
  const end = document.getElementById('f_end').value;
  const rate = document.getElementById('f_rate').value;

  if(!customer || !bank || !product || !amount || !start || !end){
    showToast('필수 항목을 모두 입력해주세요.');
    return;
  }

  const rec = {
    customer, bank, product,
    amount: Number(amount),
    start, end,
    rate: rate ? Number(rate) : null
  };

  try{
    if(editingId){
      await fetch('/api/deposits/' + editingId, {
        method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(rec)
      });
    } else {
      await fetch('/api/deposits', {
        method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(rec)
      });
    }
    showToast(editingId ? '수정되었습니다.' : '등록되었습니다.');
    resetForm();
    await loadAll();
  }catch(e){
    showToast('저장 중 오류가 발생했습니다.');
  }
});

document.getElementById('cancelBtn').addEventListener('click', resetForm);

function editRow(id){
  const r = records.find(x=>x.id===id);
  if(!r) return;
  document.getElementById('f_customer').value = r.customer;
  document.getElementById('f_bank').value = r.bank;
  document.getElementById('f_product').value = r.product;
  document.getElementById('f_amount').value = r.amount;
  document.getElementById('f_start').value = r.start;
  document.getElementById('f_end').value = r.end;
  document.getElementById('f_rate').value = r.rate ?? '';
  editingId = id;
  document.getElementById('formTitle').textContent = '내역 수정';
  document.getElementById('saveBtn').textContent = '저장';
  document.getElementById('cancelBtn').style.display = 'inline-block';
  window.scrollTo({top:0, behavior:'smooth'});
}

async function delRow(id){
  if(!confirm('이 내역을 삭제하시겠습니까?')) return;
  await fetch('/api/deposits/' + id, { method:'DELETE' });
  showToast('삭제되었습니다.');
  await loadAll();
}

function updateBankFilterOptions(){
  const sel = document.getElementById('q_bank');
  const current = sel.value;
  const banks = [...new Set(records.map(r=>r.bank))].sort();
  sel.innerHTML = '<option value="">전체</option>' +
    banks.map(b=>`<option value="${b}">${b}</option>`).join('');
  sel.value = current;
}

function render(){
  updateBankFilterOptions();
  const customer = document.getElementById('q_customer').value.trim().toLowerCase();
  const bankF = document.getElementById('q_bank').value;
  const startFrom = document.getElementById('q_start_from').value;
  const startTo = document.getElementById('q_start_to').value;
  const endFrom = document.getElementById('q_end_from').value;
  const endTo = document.getElementById('q_end_to').value;
  const amtMin = document.getElementById('q_amt_min').value;
  const amtMax = document.getElementById('q_amt_max').value;
  const sortV = document.getElementById('sortSel').value;

  let list = records.filter(r=>{
    if(customer && !r.customer.toLowerCase().includes(customer)) return false;
    if(bankF && r.bank !== bankF) return false;
    if(startFrom && r.start < startFrom) return false;
    if(startTo && r.start > startTo) return false;
    if(endFrom && r.end < endFrom) return false;
    if(endTo && r.end > endTo) return false;
    if(amtMin && r.amount < Number(amtMin)) return false;
    if(amtMax && r.amount > Number(amtMax)) return false;
    return true;
  });

  list.sort((a,b)=>{
    if(sortV==='end_asc') return new Date(a.end) - new Date(b.end);
    if(sortV==='end_desc') return new Date(b.end) - new Date(a.end);
    if(sortV==='amt_desc') return b.amount - a.amount;
    if(sortV==='amt_asc') return a.amount - b.amount;
  });

  const tbody = document.getElementById('tbody');
  document.getElementById('emptyMsg').style.display = list.length ? 'none' : 'block';

  tbody.innerHTML = list.map(r=>`
    <tr>
      <td>${r.customer}</td>
      <td>${r.bank}</td>
      <td>${r.product}</td>
      <td class="amt">${fmtAmt(r.amount)}</td>
      <td>${r.start}</td>
      <td>${r.end}</td>
      <td class="amt">${r.rate!=null ? r.rate+'%' : '-'}</td>
      <td class="amt">${r.rate!=null ? fmtAmt(calcInterest(r)) : '-'}</td>
      <td class="amt">${r.rate!=null ? fmtAmt(calcMaturityAmount(r)) : fmtAmt(r.amount)}</td>
      <td>${statusBadge(r.end)}</td>
      <td class="row-actions">
        <a onclick="editRow('${r.id}')">수정</a>
        <a class="del" onclick="delRow('${r.id}')">삭제</a>
      </td>
    </tr>
  `).join('');

  document.getElementById('sumCount').textContent = records.length + '건';
  document.getElementById('sumAmt').textContent = fmtAmt(records.reduce((s,r)=>s+r.amount,0));
  document.getElementById('sumSoon').textContent = records.filter(r=>{
    const d = daysUntil(r.end);
    return d >= 0 && d <= 30;
  }).length + '건';
  document.getElementById('sumInterest').textContent = fmtAmt(records.reduce((s,r)=>s+calcInterest(r),0));
  document.getElementById('sumMaturity').textContent = fmtAmt(records.reduce((s,r)=>s+calcMaturityAmount(r),0));
  document.getElementById('resultCount').textContent = `(${list.length}건 조회됨 / 전체 ${records.length}건)`;
}

document.getElementById('queryBtn').addEventListener('click', render);
document.getElementById('resetQueryBtn').addEventListener('click', ()=>{
  ['q_customer','q_bank','q_start_from','q_start_to','q_end_from','q_end_to','q_amt_min','q_amt_max'].forEach(id=>{
    document.getElementById(id).value = '';
  });
  render();
});
document.getElementById('queryForm').addEventListener('keydown', e=>{
  if(e.key === 'Enter'){ e.preventDefault(); render(); }
});
document.getElementById('sortSel').addEventListener('change', render);
document.getElementById('backupLink').addEventListener('click', ()=>{
  window.location.href = '/api/backup';
});

// ── 엑셀 업로드 / 다운로드 ──────────────────────────────
document.getElementById('excelDownBtn').addEventListener('click', () => {
  window.location.href = '/api/excel/download';
});
document.getElementById('excelTmplBtn').addEventListener('click', () => {
  window.location.href = '/api/excel/template';
});

document.getElementById('excelUpToggle').addEventListener('click', () => {
  const area = document.getElementById('uploadArea');
  const isVisible = area.style.display === 'block';
  area.style.display = isVisible ? 'none' : 'block';
  if (isVisible) resetUploadUI();
});

const uploadArea  = document.getElementById('uploadArea');
const fileInput   = document.getElementById('excelFileInput');
let selectedFile  = null;

uploadArea.addEventListener('click', (e) => {
  if (e.target.id === 'uploadSubmitBtn') return;
  fileInput.click();
});
fileInput.addEventListener('change', () => {
  if (fileInput.files[0]) selectFile(fileInput.files[0]);
});
uploadArea.addEventListener('dragover', (e) => { e.preventDefault(); uploadArea.classList.add('active'); });
uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('active'));
uploadArea.addEventListener('drop', (e) => {
  e.preventDefault(); uploadArea.classList.remove('active');
  if (e.dataTransfer.files[0]) selectFile(e.dataTransfer.files[0]);
});

function selectFile(file) {
  if (!file.name.match(/\.(xlsx|xls)$/i)) {
    showUploadError([{ row: null, messages: ['.xlsx 또는 .xls 파일만 업로드 가능합니다.'] }]);
    return;
  }
  selectedFile = file;
  document.getElementById('uploadPrompt').style.display = 'none';
  document.getElementById('uploadFileInfo').style.display = 'block';
  document.getElementById('uploadFileInfo').textContent = `📄 선택된 파일: ${file.name} (${(file.size/1024).toFixed(1)} KB)`;
  document.getElementById('uploadSubmitBtn').style.display = 'inline-block';
  document.getElementById('uploadErrorBox').style.display = 'none';
  document.getElementById('uploadSuccessBox').style.display = 'none';
}

document.getElementById('uploadSubmitBtn').addEventListener('click', async () => {
  if (!selectedFile) return;
  const formData = new FormData();
  formData.append('file', selectedFile);
  const btn = document.getElementById('uploadSubmitBtn');
  btn.textContent = '업로드 중...'; btn.disabled = true;

  try {
    const res  = await fetch('/api/excel/upload', { method: 'POST', body: formData });
    const data = await res.json();
    if (res.status === 422 && data.errors) {
      showUploadError(data.errors);
    } else if (!res.ok) {
      showUploadError([{ row: null, messages: [data.error || '업로드 중 오류가 발생했습니다.'] }]);
    } else {
      const box = document.getElementById('uploadSuccessBox');
      box.textContent = `✅ ${data.count}건이 성공적으로 업로드되었습니다.`;
      box.style.display = 'block';
      document.getElementById('uploadErrorBox').style.display = 'none';
      resetUploadUI(true);
      await loadAll();
    }
  } catch (e) {
    showUploadError([{ row: null, messages: ['서버와 통신 중 오류가 발생했습니다.'] }]);
  } finally {
    btn.textContent = '업로드 실행'; btn.disabled = false;
  }
});

function showUploadError(errors) {
  const box = document.getElementById('uploadErrorBox');
  box.innerHTML = '<strong>⚠️ 아래 항목을 수정 후 다시 업로드해주세요</strong><br><br>' +
    errors.map(e => {
      const label = e.row ? `<strong>${e.row}행:</strong>` : '<strong>파일 오류:</strong>';
      return `<div class="err-row">${label}<ul>${e.messages.map(m=>`<li>${m}</li>`).join('')}</ul></div>`;
    }).join('');
  box.style.display = 'block';
  document.getElementById('uploadSuccessBox').style.display = 'none';
}

function resetUploadUI(keepSuccess = false) {
  selectedFile = null; fileInput.value = '';
  document.getElementById('uploadPrompt').style.display = 'block';
  document.getElementById('uploadFileInfo').style.display = 'none';
  document.getElementById('uploadFileInfo').textContent = '';
  document.getElementById('uploadSubmitBtn').style.display = 'none';
  document.getElementById('uploadErrorBox').style.display = 'none';
  if (!keepSuccess) document.getElementById('uploadSuccessBox').style.display = 'none';
}

loadAll();
</script>
</body>
</html>
